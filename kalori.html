<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalori İhtiyacı | Bekir 29</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; background:#0f172a; color:white; min-height:100vh; }
    .glass { background:rgba(255,255,255,.05); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.1); }
  </style>
</head>
<body class="p-4 md:p-10">
  <div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-extrabold text-orange-400">Kalori İhtiyacı</h1>
        <p class="text-slate-400 mt-2">Günlük yaklaşık enerji ihtiyacınızı öğrenin.</p>
      </div>
      <a href="index.html" class="bg-white/10 hover:bg-white/20 px-5 py-3 rounded-xl transition">← Ana Sayfa</a>
    </div>

    <div class="glass p-8 rounded-3xl">
      <div class="grid md:grid-cols-2 gap-6">
        <input type="number" id="boy" placeholder="Boy (cm)" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4">
        <input type="number" id="kilo" placeholder="Kilo (kg)" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4">
        <input type="number" id="yas" placeholder="Yaş" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4">
        <button id="hesaplaBtn" class="bg-orange-500 hover:bg-orange-600 rounded-xl font-bold">HESAPLA</button>
      </div>

      <div class="mt-8 p-6 bg-white/5 rounded-2xl">
        <h2 class="text-lg text-slate-400 mb-3">Günlük Kalori Sonucu</h2>
        <div id="kaloriSonuc" class="text-5xl font-black text-orange-400">0 kcal</div>
        <p id="aciklama" class="text-slate-300 mt-4">Bilgilerinizi girip hesaplayın.</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('hesaplaBtn').addEventListener('click', function() {
      const boy = parseFloat(document.getElementById('boy').value);
      const kilo = parseFloat(document.getElementById('kilo').value);
      const yas = parseInt(document.getElementById('yas').value);

      if (boy > 0 && kilo > 0 && yas > 0) {
        const bmr = Math.round(10 * kilo + 6.25 * boy - 5 * yas + 5);
        document.getElementById('kaloriSonuc').innerText = bmr + " kcal";
        document.getElementById('aciklama').innerText = "Bu değer günlük temel enerji ihtiyacınızın yaklaşık karşılığıdır.";
      } else {
        alert("Lütfen tüm alanları doğru doldurun.");
      }
    });
  </script>
</body>
</html>
