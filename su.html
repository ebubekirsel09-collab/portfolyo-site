<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Su İhtiyacı | Bekir 29</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; background:#0f172a; color:white; min-height:100vh; }
    .glass { background:rgba(255,255,255,.05); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.1); }
  </style>
</head>
<body class="p-4 md:p-10">
  <div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-extrabold text-cyan-400">Su İhtiyacı</h1>
        <p class="text-slate-400 mt-2">Günlük yaklaşık su tüketiminizi öğrenin.</p>
      </div>
      <a href="index.html" class="bg-white/10 hover:bg-white/20 px-5 py-3 rounded-xl transition">← Ana Sayfa</a>
    </div>

    <div class="glass p-8 rounded-3xl">
      <div class="grid md:grid-cols-2 gap-6">
        <input type="number" id="kilo" placeholder="Kilo (kg)" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4">
        <button id="hesaplaBtn" class="bg-cyan-500 hover:bg-cyan-600 rounded-xl font-bold">HESAPLA</button>
      </div>

      <div class="mt-8 p-6 bg-white/5 rounded-2xl">
        <h2 class="text-lg text-slate-400 mb-3">Günlük Su İhtiyacı</h2>
        <div id="suSonuc" class="text-5xl font-black text-cyan-400">0 L</div>
        <p id="aciklama" class="text-slate-300 mt-4">Bilgilerinizi girip hesaplayın.</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('hesaplaBtn').addEventListener('click', function() {
      const kilo = parseFloat(document.getElementById('kilo').value);

      if (kilo > 0) {
        const su = (kilo * 0.035).toFixed(1);
        document.getElementById('suSonuc').innerText = su + " L";
        document.getElementById('aciklama').innerText = "Bu değer günlük yaklaşık su ihtiyacınızı gösterir.";
      } else {
        alert("Lütfen kilonuzu doğru girin.");
      }
    });
  </script>
</body>
</html>
