<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VKİ Hesaplama | Bekir 29</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; background:#0f172a; color:white; min-height:100vh; }
    .glass { background:rgba(255,255,255,.05); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.1); }
    .gradient-text { background:linear-gradient(90deg,#215e47,#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  </style>
</head>
<body class="p-4 md:p-10">
  <div class="max-w-5xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-extrabold gradient-text">VKİ Hesaplama</h1>
        <p class="text-slate-400 mt-2">Boy ve kilo bilgilerinize göre vücut kitle indeksinizi öğrenin.</p>
      </div>
      <a href="index.html" class="bg-white/10 hover:bg-white/20 px-5 py-3 rounded-xl transition">← Ana Sayfa</a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="glass p-8 rounded-3xl lg:col-span-1">
        <h2 class="text-xl font-bold mb-6">Veri Girişi</h2>
        <div class="space-y-5">
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Boy (cm)</label>
            <input type="number" id="boy" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 mt-1 outline-none text-lg" placeholder="175">
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Kilo (kg)</label>
            <input type="number" id="kilo" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 mt-1 outline-none text-lg" placeholder="75">
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Yaş</label>
            <input type="number" id="yas" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 mt-1 outline-none text-lg" placeholder="25">
          </div>
          <button id="hesaplaBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition">HESAPLA</button>
        </div>
      </div>

      <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-8 rounded-3xl border-t-4 border-emerald-500 relative overflow-hidden">
          <div class="relative z-10">
            <h2 class="text-lg font-bold text-slate-400">VKE Skorun</h2>
            <div id="vkeDeger" class="text-7xl font-black my-4 tracking-tighter">--</div>
            <div id="vkeDurum" class="inline-block px-4 py-1 rounded-full bg-white/5 text-sm font-semibold">Veri Bekleniyor</div>
          </div>
          <div class="absolute -right-4 -bottom-4 opacity-5 text-8xl font-black">BMI</div>
        </div>

        <div class="glass p-8 rounded-3xl">
          <h2 class="text-lg font-bold text-slate-400 mb-6">Destek Bilgileri</h2>
          <div class="space-y-4">
            <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl">
              <div>🔥 Kalori</div>
              <span id="kalori" class="font-bold text-blue-400 text-lg">0 kcal</span>
            </div>
            <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl">
              <div>🥩 Protein</div>
              <span id="protein" class="font-bold text-orange-400 text-lg">0 g</span>
            </div>
            <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl">
              <div>💧 Su</div>
              <span id="su" class="font-bold text-cyan-400 text-lg">0 L</span>
            </div>
          </div>
        </div>

        <div class="glass p-8 rounded-3xl md:col-span-2">
          <h2 class="text-lg font-bold text-slate-400 mb-4">Öneri</h2>
          <p id="tavsiye" class="text-slate-300 leading-relaxed italic text-lg">
            "Verilerinizi girdiğinizde size özel öneri burada görünecek."
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('hesaplaBtn').addEventListener('click', function() {
      const boy = parseFloat(document.getElementById('boy').value) / 100;
      const kilo = parseFloat(document.getElementById('kilo').value);
      const yas = parseInt(document.getElementById('yas').value);

      if (boy > 0 && kilo > 0 && yas > 0) {
        const vke = (kilo / (boy * boy)).toFixed(1);
        document.getElementById('vkeDeger').innerText = vke;

        let durum = "";
        let tavsiyeText = "";
        const durumEl = document.getElementById('vkeDurum');

        if (vke < 18.5) {
          durum = "Düşük Kilolu";
          durumEl.className = "inline-block px-4 py-1 rounded-full bg-yellow-500/20 text-yellow-400 text-sm font-semibold";
          tavsiyeText = "Vücut kitle indeksiniz düşük. Daha dengeli ve kalori yoğunluğu yüksek beslenme planı faydalı olabilir.";
        } else if (vke < 25) {
          durum = "İdeal Kiloda";
          durumEl.className = "inline-block px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold";
          tavsiyeText = "İdeal aralıktasınız. Dengeli beslenme ve düzenli aktiviteyle bu form korunabilir.";
        } else if (vke < 30) {
          durum = "Fazla Kilolu";
          durumEl.className = "inline-block px-4 py-1 rounded-full bg-orange-500/20 text-orange-400 text-sm font-semibold";
          tavsiyeText = "Kilo kontrolü için günlük enerji alımını düzenlemek ve hareketi artırmak faydalı olabilir.";
        } else {
          durum = "Obezite Sınırı";
          durumEl.className = "inline-block px-4 py-1 rounded-full bg-red-500/20 text-red-400 text-sm font-semibold";
          tavsiyeText = "Sağlık takibi için uzman desteğiyle kontrollü beslenme planı oluşturulması faydalı olur.";
        }

        durumEl.innerText = durum;
        document.getElementById('tavsiye').innerText = `"${tavsiyeText}"`;

        const bmr = Math.round(10 * kilo + 6.25 * (boy * 100) - 5 * yas + 5);
        document.getElementById('kalori').innerText = `${bmr} kcal`;
        document.getElementById('protein').innerText = `${Math.round(kilo * 1.5)} g`;
        document.getElementById('su').innerText = `${(kilo * 0.035).toFixed(1)} L`;
      } else {
        alert("Lütfen tüm alanları doğru doldurun.");
      }
    });
  </script>
</body>
</html>
